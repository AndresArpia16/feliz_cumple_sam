<!DOCTYPE html>
<!--
  PASSWORD.HTML
  Pantalla elegante y minimalista de contraseña.
  No revela pistas ni menciona que existen dos contraseñas distintas.
  La lógica de verificación está en script.js (función iniciarPassword).
-->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contraseña</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Dancing+Script:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="fondo-romantico"></div>
  <div class="vineta-vela"></div>
  <div class="capa-brillos"></div>
  <div id="contenedor-particulas"></div>

  <main class="pantalla">
    <div class="tarjeta-cristal contenedor-password">
      <div id="sello-cera" class="sello-cera" aria-hidden="true">❤</div>

      <h1 class="etiqueta-password">Contraseña</h1>

      <form id="form-password" autocomplete="off">
        <input
          id="input-password"
          class="input-password"
          type="password"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="8"
          autofocus
          required
        />
        <p id="mensaje-error" class="mensaje-error"></p>

        <div class="grupo-botones" style="display: flex; margin-top: 1.5rem;">
          <button type="submit" class="boton boton-primario">Entrar</button>
        </div>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
